name: Bourse Casa Bot

on:
  schedule:
    - cron: '0 8-22 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install yfinance requests pandas
      - run: python bot.py
