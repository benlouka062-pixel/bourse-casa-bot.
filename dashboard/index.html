<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>TAOUSSI TRADER · DASHBOARD</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:wght@100..800&display=swap');
        * { font-family: 'Inter', sans-serif; }
        body { background: #0f0f0f; color: #e5e7eb; }
        .glass-card { background: rgba(22,22,22,0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.03); border-radius: 1rem; }
        .trend-up { color: #00b8a9; }
        .trend-down { color: #ff6b6b; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .badge-metal { background: rgba(0,184,169,0.1); color: #00b8a9; padding: 0.25rem 0.75rem; border-radius: 2rem; font-size: 0.75rem; border: 1px solid rgba(0,184,169,0.2); }
        .metal-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; }
        .metal-item { background: rgba(0,0,0,0.25); padding: 0.75rem; border-radius: 0.75rem; border: 1px solid rgba(255,255,255,0.03); }
        .action-card { background: rgba(26,32,39,0.9); border-radius: 1rem; padding: 1rem; margin-bottom: 0.75rem; border: 1px solid rgba(255,255,255,0.03); cursor: pointer; transition: all 0.2s; }
        .action-card:hover { background: rgba(32,38,45,0.95); border-color: #00b8a9; transform: translateY(-2px); }
        .time-display { font-size: 2rem; font-weight: 600; background: linear-gradient(135deg, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .time-label { font-size: 0.8rem; color: #64748b; text-transform: uppercase; }
    </style>
</head>
<body class="p-4 min-h-screen">

<div x-data="taoussiDashboard()" x-init="init()" class="max-w-7xl mx-auto">
    
    <!-- HEADER -->
    <div class="glass-card p-6 mb-6 flex flex-wrap items-center justify-between">
        <div class="flex items-center space-x-4">
            <div class="w-12 h-12 bg-gradient-to-br from-emerald-500 to-teal-600 rounded-xl flex items-center justify-center">
                <i class="fas fa-chart-line text-white text-xl"></i>
            </div>
            <div>
                <h1 class="text-3xl font-bold bg-gradient-to-r from-emerald-400 to-cyan-400 bg-clip-text text-transparent">
                    TAOUSSI CAPITAL
                </h1>
                <p class="text-sm text-gray-500 mt-1">Bourse de Casablanca · Données réelles</p>
            </div>
        </div>
        
        <div class="flex items-center space-x-8">
            <div class="text-right">
                <div class="time-label">CASABLANCA</div>
                <div class="time-display" x-text="casablancaTime"></div>
            </div>
            <div class="text-right">
                <div class="time-label">NEW YORK</div>
                <div class="time-display text-2xl" x-text="nyTime"></div>
            </div>
        </div>
    </div>

    <!-- STATS MASI -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
        <div class="glass-card p-5">
            <p class="text-sm text-gray-500 mb-1">MASI</p>
            <p class="text-3xl font-bold font-mono" x-text="masi ? masi.toLocaleString() : '---'"></p>
        </div>
        <div class="glass-card p-5">
            <p class="text-sm text-gray-500 mb-1">VOLUME</p>
            <p class="text-3xl font-bold font-mono" x-text="volume || '---'"></p>
        </div>
        <div class="glass-card p-5">
            <p class="text-sm text-gray-500 mb-1">VARIATION</p>
            <p class="text-3xl font-bold font-mono" :class="variation >= 0 ? 'trend-up' : 'trend-down'" x-text="variation || '---'"></p>
        </div>
    </div>

    <!-- MÉTAUX PRÉCIEUX + INDUSTRIELS -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-6">
        <!-- Métaux précieux (Or, Argent) -->
        <div class="glass-card p-5">
            <div class="flex items-center justify-between mb-4">
                <div class="flex items-center space-x-2">
                    <i class="fas fa-crown text-yellow-500"></i>
                    <h3 class="font-semibold text-gray-300">MÉTAUX PRÉCIEUX</h3>
                </div>
                <span class="badge-metal">LIVE</span>
            </div>
            <div class="metal-grid">
                <!-- Or -->
                <div class="metal-item">
                    <div class="flex justify-between">
                        <span class="font-medium">Or</span>
                        <span class="text-xs text-gray-500">XAU</span>
                    </div>
                    <div class="text-lg font-mono font-bold mt-1" x-text="(metaux?.precieux?.XAU?.prix || 0).toFixed(2) + ' USD'"></div>
                    <div class="text-xs" :class="(metaux?.precieux?.XAU?.variation || 0) >= 0 ? 'trend-up' : 'trend-down'" 
                         x-text="((metaux?.precieux?.XAU?.variation || 0) > 0 ? '+' : '') + (metaux?.precieux?.XAU?.variation || 0).toFixed(1) + '%'"></div>
                </div>
                <!-- Argent -->
                <div class="metal-item">
                    <div class="flex justify-between">
                        <span class="font-medium">Argent</span>
                        <span class="text-xs text-gray-500">XAG</span>
                    </div>
                    <div class="text-lg font-mono font-bold mt-1" x-text="(metaux?.precieux?.XAG?.prix || 0).toFixed(2) + ' USD'"></div>
                    <div class="text-xs" :class="(metaux?.precieux?.XAG?.variation || 0) >= 0 ? 'trend-up' : 'trend-down'"
                         x-text="((metaux?.precieux?.XAG?.variation || 0) > 0 ? '+' : '') + (metaux?.precieux?.XAG?.variation || 0).toFixed(1) + '%'"></div>
                </div>
                <div class="metal-item opacity-0"></div> <!-- placeholder pour garder la grille -->
            </div>
        </div>

        <!-- Métaux industriels (Cuivre, Zinc, Plomb) -->
        <div class="glass-card p-5">
            <div class="flex items-center justify-between mb-4">
                <div class="flex items-center space-x-2">
                    <i class="fas fa-industry text-blue-500"></i>
                    <h3 class="font-semibold text-gray-300">MÉTAUX INDUSTRIELS</h3>
                </div>
                <span class="badge-metal">LIVE</span>
            </div>
            <div class="metal-grid">
                <!-- Cuivre -->
                <div class="metal-item">
                    <div class="flex justify-between">
                        <span class="font-medium">Cuivre</span>
                        <span class="text-xs text-gray-500">CU</span>
                    </div>
                    <div class="text-lg font-mono font-bold mt-1" x-text="(metaux?.industriels?.XCU?.prix || 0).toFixed(2) + ' USD'"></div>
                    <div class="text-xs" :class="(metaux?.industriels?.XCU?.variation || 0) >= 0 ? 'trend-up' : 'trend-down'"
                         x-text="((metaux?.industriels?.XCU?.variation || 0) > 0 ? '+' : '') + (metaux?.industriels?.XCU?.variation || 0).toFixed(1) + '%'"></div>
                </div>
                <!-- Zinc -->
                <div class="metal-item">
                    <div class="flex justify-between">
                        <span class="font-medium">Zinc</span>
                        <span class="text-xs text-gray-500">ZN</span>
                    </div>
                    <div class="text-lg font-mono font-bold mt-1" x-text="(metaux?.industriels?.XZN?.prix || 0).toFixed(2) + ' USD'"></div>
                    <div class="text-xs" :class="(metaux?.industriels?.XZN?.variation || 0) >= 0 ? 'trend-up' : 'trend-down'"
                         x-text="((metaux?.industriels?.XZN?.variation || 0) > 0 ? '+' : '') + (metaux?.industriels?.XZN?.variation || 0).toFixed(1) + '%'"></div>
                </div>
                <!-- Plomb -->
                <div class="metal-item">
                    <div class="flex justify-between">
                        <span class="font-medium">Plomb</span>
                        <span class="text-xs text-gray-500">PB</span>
                    </div>
                    <div class="text-lg font-mono font-bold mt-1" x-text="(metaux?.industriels?.XPB?.prix || 0).toFixed(2) + ' USD'"></div>
                    <div class="text-xs" :class="(metaux?.industriels?.XPB?.variation || 0) >= 0 ? 'trend-up' : 'trend-down'"
                         x-text="((metaux?.industriels?.XPB?.variation || 0) > 0 ? '+' : '') + (metaux?.industriels?.XPB?.variation || 0).toFixed(1) + '%'"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- ACTIONS -->
    <div class="glass-card p-5 mb-6">
        <div class="flex items-center justify-between mb-4">
            <div class="flex items-center space-x-2">
                <i class="fas fa-chart-simple text-emerald-500"></i>
                <h2 class="font-semibold text-gray-300">ACTIONS SUIVIES</h2>
            </div>
            <span class="text-sm text-gray-500" x-text="actions.length + ' valeurs'"></span>
        </div>
        
        <div id="actions-container" class="space-y-2 max-h-96 overflow-y-auto pr-2"></div>
    </div>
</div>

<script>
async function loadData() {
    try {
        const res = await fetch('https://benlouka062-pixel.github.io/bourse-casa-bot/data.json?t=' + Date.now());
        const data = await res.json();
        
        // Mise à jour Alpine store
        Alpine.store('metaux', data.metaux || { precieux: {}, industriels: {} });
        Alpine.store('masi', data.masi);
        Alpine.store('volume', data.volume);
        Alpine.store('variation', data.variation);
        
        // Actions
        let html = '';
        if (data.actions && data.actions.length > 0) {
            data.actions.forEach(a => {
                html += `<div class="action-card" onclick="window.location.href='detail.html?symbol=${a.sym}'">
                    <div class="flex justify-between items-start">
                        <div>
                            <span class="font-bold text-emerald-500 text-lg">${a.sym}</span>
                            <span class="text-sm text-gray-500 ml-2">${a.nom || ''}</span>
                        </div>
                        <span class="font-mono text-lg font-bold">${a.prix?.toFixed(2) || '---'} DH</span>
                    </div>
                    <div class="flex justify-between items-center mt-3">
                        <span class="text-sm">RSI: <span class="${a.rsi > 70 ? 'trend-up' : a.rsi < 30 ? 'trend-down' : ''} font-mono">${a.rsi || '--'}</span></span>
                        <span class="text-sm">Signal: <span class="${a.signal === 'ACHAT' ? 'text-green-500' : a.signal === 'VENTE' ? 'text-red-500' : ''}">${a.signal || 'ATTENTE'}</span></span>
                    </div>
                </div>`;
            });
        } else {
            html = '<p class="text-center text-gray-500 py-4">Aucune action disponible</p>';
        }
        document.getElementById('actions-container').innerHTML = html;
        
    } catch (e) {
        console.error('Erreur chargement:', e);
        document.getElementById('actions-container').innerHTML = '<p class="text-center text-red-500 py-4">Erreur de chargement</p>';
    }
}

function updateTime() {
    const now = new Date();
    const casablancaTime = new Date(now.getTime() + 3600000);
    const nyTime = new Date(now.toLocaleString('en-US', { timeZone: 'America/New_York' }));
    
    document.querySelector('[x-text="casablancaTime"]').textContent = 
        casablancaTime.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
    document.querySelector('[x-text="nyTime"]').textContent = 
        nyTime.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
}

document.addEventListener('alpine:init', () => {
    Alpine.store('metaux', { precieux: {}, industriels: {} });
    Alpine.store('masi', '---');
    Alpine.store('volume', '---');
    Alpine.store('variation', '---');
    
    Alpine.data('taoussiDashboard', () => ({
        metaux: Alpine.store('metaux'),
        masi: Alpine.store('masi'),
        volume: Alpine.store('volume'),
        variation: Alpine.store('variation'),
        actions: [],
        casablancaTime: '',
        nyTime: '',
        
        init() {
            updateTime();
            setInterval(updateTime, 60000);
            loadData().then(() => {
                this.metaux = Alpine.store('metaux');
                this.masi = Alpine.store('masi');
                this.volume = Alpine.store('volume');
                this.variation = Alpine.store('variation');
            });
            setInterval(loadData, 300000);
        }
    }));
});
</script>

</body>
</html>
