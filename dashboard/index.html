<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>TAOUSSI TRADER · Dashboard Pro</title>
    
    <!-- Bibliothèque pour export PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #0b0e14;
            color: #f0f4fa;
            padding: 20px;
            min-height: 100vh;
        }

        .glass {
            background: rgba(20, 30, 45, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 255, 180, 0.15);
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
        }

        .card {
            background: rgba(12, 18, 28, 0.8);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            padding: 20px;
            border: 1px solid rgba(0, 255, 200, 0.15);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.8);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .title {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #00ffb4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .source-badge {
            background: rgba(0, 255, 180, 0.1);
            color: #00ffb4;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 14px;
            border: 1px solid rgba(0, 255, 180, 0.3);
        }

        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 20px;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 16px;
            text-align: center;
        }

        .stat-label {
            color: #888;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 26px;
            font-weight: 700;
            margin-top: 8px;
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 40px;
            font-size: 11px;
            font-weight: 600;
            white-space: nowrap;
        }

        .badge-achat {
            background: rgba(0, 255, 157, 0.2);
            color: #00ff9d;
            border: 1px solid #00ff9d;
        }

        .badge-vente {
            background: rgba(255, 94, 124, 0.2);
            color: #ff5e7c;
            border: 1px solid #ff5e7c;
        }

        .badge-attente {
            background: rgba(255, 255, 255, 0.1);
            color: #aaa;
            border: 1px solid #333;
        }

        .badge-breakout {
            background: rgba(255, 215, 0, 0.2);
            color: #ffd700;
            border: 1px solid #ffd700;
            animation: pulse 2s infinite;
        }

        .badge-div-hauss {
            background: rgba(0, 200, 255, 0.2);
            color: #4dc3ff;
            border: 1px solid #4dc3ff;
        }

        .badge-div-baisse {
            background: rgba(255, 100, 150, 0.2);
            color: #ff99aa;
            border: 1px solid #ff99aa;
        }

        .badge-metal {
            background: rgba(255, 215, 0, 0.1);
            color: #ffd700;
            border: 1px solid #ffd700;
        }

        .badge-sentiment-positif {
            background: rgba(0, 255, 0, 0.15);
            color: #90ff90;
            border: 1px solid #90ff90;
        }

        .badge-sentiment-negatif {
            background: rgba(255, 0, 0, 0.15);
            color: #ff9090;
            border: 1px solid #ff9090;
        }

        .badge-sentiment-neutre {
            background: rgba(255, 255, 255, 0.1);
            color: #ccc;
            border: 1px solid #444;
        }

        .badge-support {
            background: rgba(0, 100, 255, 0.2);
            color: #4da6ff;
            border: 1px solid #4da6ff;
        }

        .badge-resistance {
            background: rgba(255, 165, 0, 0.2);
            color: #ffaa33;
            border: 1px solid #ffaa33;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        .action-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 16px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .action-row:last-child {
            border-bottom: none;
        }

        .action-info {
            flex: 2;
        }

        .action-symbol {
            font-weight: 700;
            font-size: 16px;
        }

        .action-name {
            color: #888;
            font-size: 12px;
            margin-left: 8px;
        }

        .action-price {
            font-weight: 700;
            font-size: 18px;
            text-align: right;
            white-space: nowrap;
        }

        .action-details {
            display: flex;
            gap: 12px;
            margin: 8px 0;
            flex-wrap: wrap;
            align-items: center;
        }

        .level-indicator {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 13px;
            color: #aaa;
        }

        .badge-container {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-top: 8px;
        }

        .metal-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,215,0,0.1);
        }

        .metal-row:last-child {
            border-bottom: none;
        }

        .metal-name {
            font-weight: 600;
            color: #ffd700;
        }

        .metal-price {
            font-family: monospace;
            font-size: 16px;
        }

        .button-container {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .action-btn {
            background: #00ffb4;
            color: #000;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
            min-width: 150px;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,255,180,0.3);
        }

        .action-btn.secondary {
            background: #ffaa33;
        }

        .action-btn.export {
            background: #ff5e7c;
        }

        .footer {
            margin-top: 30px;
            text-align: center;
            color: #666;
            font-size: 12px;
        }

        @media (max-width: 600px) {
            .grid-3, .grid-2 {
                grid-template-columns: 1fr;
            }
            .action-row {
                flex-direction: column;
                gap: 12px;
            }
            .action-price {
                text-align: left;
                width: 100%;
            }
            .button-container {
                flex-direction: column;
                align-items: stretch;
            }
            .action-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div id="dashboard-content">
        <div class="header">
            <span class="title">📊 TAOUSSI TRADER · PRO</span>
            <span class="source-badge" id="source-badge">⏳ Chargement...</span>
        </div>

        <!-- Stats marché -->
        <div class="grid-3">
            <div class="stat-card">
                <div class="stat-label">MASI</div>
                <div class="stat-value" id="masi">---</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Volume</div>
                <div class="stat-value" id="volume">---</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Variation</div>
                <div class="stat-value" id="variation">---</div>
            </div>
        </div>

        <!-- Métaux précieux et industriels -->
        <div class="grid-2">
            <div class="card">
                <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 16px;">
                    <span class="badge-metal">🏅</span>
                    <span style="font-weight: 600;">MÉTAUX PRÉCIEUX</span>
                </div>
                <div id="metaux-precieux">
                    <div style="text-align: center; color: #666;">Chargement...</div>
                </div>
            </div>
            
            <div class="card">
                <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 16px;">
                    <span class="badge-metal">🔧</span>
                    <span style="font-weight: 600;">MÉTAUX INDUSTRIELS</span>
                </div>
                <div id="metaux-industriels">
                    <div style="text-align: center; color: #666;">Chargement...</div>
                </div>
            </div>
        </div>

        <!-- Liste des actions -->
        <div class="card">
            <div style="display: flex; justify-content: space-between; margin-bottom: 16px;">
                <span style="font-weight: 600;">🔥 SUIVI ACTIONS</span>
                <span style="color: #00ffb4;" id="update-time"></span>
            </div>
            <div id="actions-container">
                <div style="text-align: center; padding: 40px; color: #666;">
                    Chargement des données...
                </div>
            </div>
        </div>
    </div>

    <!-- Boutons d'action -->
    <div class="button-container">
        <button class="action-btn" onclick="loadData()">⟳ RAFRAÎCHIR</button>
        <button class="action-btn secondary" onclick="exportPDF()">📄 EXPORT PDF</button>
    </div>

    <div class="footer">
        Mise à jour automatique toutes les 5 min • Données réelles 24/7
    </div>

    <script>
        // === FONCTION D'EXPORT PDF ===
        function exportPDF() {
            const element = document.getElementById('dashboard-content');
            const opt = {
                margin: [0.5, 0.5, 0.5, 0.5],
                filename: `taoussi-dashboard-${new Date().toISOString().slice(0,10)}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, letterRendering: true },
                jsPDF: { unit: 'in', format: 'a4', orientation: 'landscape' }
            };
            
            // Afficher un indicateur
            const btn = event.target;
            const originalText = btn.textContent;
            btn.textContent = '📄 GÉNÉRATION...';
            btn.disabled = true;
            
            // Générer le PDF
            html2pdf().set(opt).from(element).save().then(() => {
                btn.textContent = originalText;
                btn.disabled = false;
            });
        }

        // === CHARGEMENT DES DONNÉES ===
        async function loadData() {
            try {
                // Données métaux (simulées pour l'exemple)
                const metaux = {
                    precieux: {
                        XAU: { nom: "Or", prix: 2350.50, unite: "$/oz", variation: 0.8 },
                        XAG: { nom: "Argent", prix: 28.75, unite: "$/oz", variation: 1.2 }
                    },
                    industriels: {
                        XCU: { nom: "Cuivre", prix: 4.25, unite: "$/lb", variation: 0.3 },
                        XPB: { nom: "Plomb", prix: 2150, unite: "$/t", variation: -0.2 },
                        XZN: { nom: "Zinc", prix: 2580, unite: "$/t", variation: 0.5 }
                    }
                };
                
                // Affichage métaux précieux
                const precieuxDiv = document.getElementById('metaux-precieux');
                let precieuxHtml = '';
                for (let [key, m] of Object.entries(metaux.precieux)) {
                    const varClass = m.variation > 0 ? 'price-up' : 'price-down';
                    precieuxHtml += `
                        <div class="metal-row">
                            <span class="metal-name">${m.nom}</span>
                            <div style="text-align: right;">
                                <div class="metal-price">${m.prix.toFixed(2)} ${m.unite}</div>
                                <div style="font-size: 12px; color: ${m.variation > 0 ? '#00ff9d' : '#ff5e7c'}">${m.variation > 0 ? '+' : ''}${m.variation}%</div>
                            </div>
                        </div>
                    `;
                }
                precieuxDiv.innerHTML = precieuxHtml;
                
                // Affichage métaux industriels
                const industrielsDiv = document.getElementById('metaux-industriels');
                let industrielsHtml = '';
                for (let [key, m] of Object.entries(metaux.industriels)) {
                    const varClass = m.variation > 0 ? 'price-up' : 'price-down';
                    industrielsHtml += `
                        <div class="metal-row">
                            <span class="metal-name">${m.nom}</span>
                            <div style="text-align: right;">
                                <div class="metal-price">${m.prix.toFixed(2)} ${m.unite}</div>
                                <div style="font-size: 12px; color: ${m.variation > 0 ? '#00ff9d' : '#ff5e7c'}">${m.variation > 0 ? '+' : ''}${m.variation}%</div>
                            </div>
                        </div>
                    `;
                }
                industrielsDiv.innerHTML = industrielsHtml;
                
                // Chargement des données actions
                const response = await fetch('/bourse-casa-bot/data.json');
                const data = await response.json();
                
                document.getElementById('source-badge').textContent = data.source || 'Source inconnue';
                document.getElementById('update-time').textContent = data.date || '';
                document.getElementById('masi').textContent = data.masi ? data.masi.toFixed(2) : '---';
                document.getElementById('volume').textContent = data.volume || '---';
                document.getElementById('variation').textContent = data.variation || '---';
                
                const container = document.getElementById('actions-container');
                
                if (!data.actions || data.actions.length === 0) {
                    container.innerHTML = '<div style="text-align: center; padding: 40px; color: #666;">Aucune donnée disponible</div>';
                    return;
                }
                
                let html = '';
                
                data.actions.forEach(a => {
                    let signalBadge = '';
                    if (a.signal === 'BREAKOUT') {
                        signalBadge = '<span class="badge badge-breakout">🚀 BREAKOUT</span>';
                    } else if (a.signal === 'DIVERGENCE') {
                        if (a.divergence && a.divergence.type === 'DIVERGENCE_HAUSSIERE') {
                            signalBadge = '<span class="badge badge-div-hauss">📈 DIV HAUSSIÈRE</span>';
                        } else {
                            signalBadge = '<span class="badge badge-div-baisse">📉 DIV BAISSIÈRE</span>';
                        }
                    } else if (a.signal === 'ACHAT') {
                        signalBadge = '<span class="badge badge-achat">🟢 ACHAT</span>';
                    } else if (a.signal === 'VENTE') {
                        signalBadge = '<span class="badge badge-vente">🔴 VENTE</span>';
                    } else {
                        signalBadge = '<span class="badge badge-attente">⚪ ATTENTE</span>';
                    }
                    
                    // Badge sentiment
                    let sentimentBadge = '';
                    if (a.sentiment) {
                        let sentimentClass = 'badge-sentiment-neutre';
                        if (a.sentiment.label === '🟢 POSITIF') sentimentClass = 'badge-sentiment-positif';
                        if (a.sentiment.label === '🔴 NEGATIF') sentimentClass = 'badge-sentiment-negatif';
                        
                        sentimentBadge = `<span class="badge ${sentimentClass}">📰 ${a.sentiment.label}</span>`;
                    }
                    
                    let breakoutDetail = '';
                    if (a.breakout) {
                        breakoutDetail = `<span class="badge badge-breakout">📊 Vol x${a.breakout.volume_ratio}</span>`;
                    }
                    
                    let divergenceDetail = '';
                    if (a.divergence && a.signal !== 'DIVERGENCE') {
                        if (a.divergence.type === 'DIVERGENCE_HAUSSIERE') {
                            divergenceDetail = '<span class="badge badge-div-hauss">📈 DIV</span>';
                        } else {
                            divergenceDetail = '<span class="badge badge-div-baisse">📉 DIV</span>';
                        }
                    }
                    
                    let proximityBadges = '';
                    if (a.support && a.dist_support !== null && Math.abs(a.dist_support) < 3) {
                        proximityBadges += `<span class="badge badge-support">⬇️ S ${a.dist_support}%</span>`;
                    }
                    if (a.resistance && a.dist_resistance !== null && Math.abs(a.dist_resistance) < 3) {
                        proximityBadges += `<span class="badge badge-resistance">⬆️ R ${a.dist_resistance}%</span>`;
                    }
                    
                    html += `
                        <div class="action-row">
                            <div class="action-info">
                                <div>
                                    <span class="action-symbol">${a.sym}</span>
                                    <span class="action-name">${a.nom || ''}</span>
                                </div>
                                
                                <div class="action-details">
                                    <div class="level-indicator">
                                        <span>📊 RSI: ${a.rsi || '--'}</span>
                                    </div>
                                    ${a.support ? `<div class="level-indicator"><span>🛡️ S:${a.support}</span></div>` : ''}
                                    ${a.resistance ? `<div class="level-indicator"><span>🧱 R:${a.resistance}</span></div>` : ''}
                                </div>
                                
                                <div class="badge-container">
                                    ${signalBadge}
                                    ${sentimentBadge}
                                    ${breakoutDetail}
                                    ${divergenceDetail}
                                    ${proximityBadges}
                                </div>
                            </div>
                            
                            <div class="action-price">
                                ${a.prix ? a.prix.toFixed(2) + ' DH' : '--'}
                            </div>
                        </div>
                    `;
                });
                
                container.innerHTML = html;
                
            } catch (error) {
                console.error('Erreur:', error);
                document.getElementById('actions-container').innerHTML = 
                    '<div style="text-align: center; padding: 40px; color: #ff5e7c;">❌ Erreur de chargement</div>';
            }
        }

        // Chargement initial
        loadData();
        
        // Rechargement auto toutes les 5 minutes
        setInterval(loadData, 300000);
    </script>
</body>
</html>
