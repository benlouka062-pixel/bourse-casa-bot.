<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>TAOUSSI CAPITAL · DASHBOARD</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:wght@100..800&display=swap');
        
        * { font-family: 'Inter', sans-serif; }
        body { background: #0a0c10; color: #e5e7eb; }
        
        .glass-panel { 
            background: rgba(18, 22, 28, 0.85); 
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 1.25rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }
        
        .glass-card {
            background: rgba(26, 32, 39, 0.9);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 1rem;
            transition: all 0.2s ease;
        }
        
        .glass-card:hover {
            background: rgba(32, 38, 45, 0.95);
            border-color: rgba(0, 184, 169, 0.3);
        }
        
        .trend-up { color: #00b8a9; }
        .trend-down { color: #ff6b6b; }
        
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        
        .badge-metal {
            background: rgba(0, 184, 169, 0.1);
            color: #00b8a9;
            padding: 0.25rem 0.75rem;
            border-radius: 2rem;
            font-size: 0.75rem;
            font-weight: 500;
            border: 1px solid rgba(0, 184, 169, 0.2);
        }
        
        .badge-precious {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.15), rgba(255, 215, 0, 0.05));
            color: #ffd700;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }
        
        .badge-industrial {
            background: linear-gradient(135deg, rgba(100, 150, 255, 0.15), rgba(100, 150, 255, 0.05));
            color: #6496ff;
            border: 1px solid rgba(100, 150, 255, 0.2);
        }
        
        .metal-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.75rem;
        }
        
        .metal-item {
            background: rgba(0, 0, 0, 0.25);
            padding: 0.75rem;
            border-radius: 0.75rem;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }
        
        .metal-symbol {
            font-size: 0.7rem;
            color: #9ca3af;
            text-transform: uppercase;
        }
        
        .sparkline-container {
            width: 100%;
            height: 40px;
            margin-top: 0.5rem;
        }
        
        .action-card {
            background: rgba(26, 32, 39, 0.9);
            border-radius: 1rem;
            padding: 1rem;
            margin-bottom: 0.75rem;
            border: 1px solid rgba(255, 255, 255, 0.03);
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .action-card:hover {
            background: rgba(32, 38, 45, 0.95);
            border-color: #00b8a9;
            transform: translateY(-2px);
        }
        
        .time-display {
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .time-label {
            font-size: 0.8rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        .alert-btn {
            background: rgba(251, 191, 36, 0.1);
            color: #fbbf24;
            border: 1px solid rgba(251, 191, 36, 0.2);
            padding: 0.25rem 0.75rem;
            border-radius: 2rem;
            font-size: 0.75rem;
            transition: all 0.2s ease;
        }
        
        .alert-btn:hover {
            background: rgba(251, 191, 36, 0.2);
            border-color: #fbbf24;
        }
    </style>
</head>
<body class="p-4 min-h-screen">

<div x-data="taoussiCapital()" x-init="init()" class="max-w-7xl mx-auto">
    
    <!-- HEADER LUXE -->
    <div class="glass-panel p-6 mb-6 flex flex-wrap items-center justify-between">
        <div class="flex items-center space-x-4">
            <div class="w-12 h-12 bg-gradient-to-br from-emerald-500 to-teal-600 rounded-xl flex items-center justify-center shadow-lg">
                <i class="fas fa-chart-line text-white text-xl"></i>
            </div>
            <div>
                <h1 class="text-3xl font-bold bg-gradient-to-r from-emerald-400 via-teal-400 to-cyan-400 bg-clip-text text-transparent">
                    TAOUSSI CAPITAL
                </h1>
                <p class="text-sm text-gray-500 mt-1">Bourse de Casablanca · Analyse temps réel</p>
            </div>
        </div>
        
        <div class="flex items-center space-x-8">
            <div class="text-right">
                <div class="time-label">CASABLANCA</div>
                <div class="time-display" x-text="casablancaTime"></div>
            </div>
            <div class="text-right">
                <div class="time-label">NEW YORK</div>
                <div class="time-display text-2xl" x-text="nyTime"></div>
            </div>
        </div>
    </div>

    <!-- STATS MASI -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
        <div class="glass-card p-5">
            <p class="text-sm text-gray-500 mb-1">MASI</p>
            <p class="text-3xl font-bold font-mono" x-text="masi ? masi.toLocaleString() : '---'"></p>
        </div>
        <div class="glass-card p-5">
            <p class="text-sm text-gray-500 mb-1">VOLUME</p>
            <p class="text-3xl font-bold font-mono" x-text="volume || '---'"></p>
        </div>
        <div class="glass-card p-5">
            <p class="text-sm text-gray-500 mb-1">VARIATION</p>
            <p class="text-3xl font-bold font-mono" :class="variation >= 0 ? 'trend-up' : 'trend-down'" x-text="variation || '---'"></p>
        </div>
    </div>

    <!-- MÉTAUX REDESIGNÉS -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-6">
        <!-- Métaux précieux -->
        <div class="glass-card p-5">
            <div class="flex items-center justify-between mb-4">
                <div class="flex items-center space-x-2">
                    <i class="fas fa-crown text-yellow-500"></i>
                    <h3 class="font-semibold text-gray-300">MÉTAUX PRÉCIEUX</h3>
                </div>
                <span class="badge-metal badge-precious">LIVE</span>
            </div>
            
            <div class="metal-grid">
                <div class="metal-item">
                    <div class="flex justify-between items-center">
                        <span class="font-medium">Or</span>
                        <span class="metal-symbol">XAU</span>
                    </div>
                    <div class="text-lg font-mono font-bold mt-1" x-text="(metals.precieux?.XAU?.prix || 2350).toFixed(2) + ' USD'"></div>
                    <div class="text-xs" :class="(metals.precieux?.XAU?.variation || 0) >= 0 ? 'trend-up' : 'trend-down'" 
                         x-text="((metals.precieux?.XAU?.variation || 0) > 0 ? '+' : '') + (metals.precieux?.XAU?.variation || 0).toFixed(1) + '%'"></div>
                </div>
                
                <div class="metal-item">
                    <div class="flex justify-between items-center">
                        <span class="font-medium">Argent</span>
                        <span class="metal-symbol">XAG</span>
                    </div>
                    <div class="text-lg font-mono font-bold mt-1" x-text="(metals.precieux?.XAG?.prix || 28.7).toFixed(2) + ' USD'"></div>
                    <div class="text-xs" :class="(metals.precieux?.XAG?.variation || 0) >= 0 ? 'trend-up' : 'trend-down'"
                         x-text="((metals.precieux?.XAG?.variation || 0) > 0 ? '+' : '') + (metals.precieux?.XAG?.variation || 0).toFixed(1) + '%'"></div>
                </div>
            </div>
        </div>

        <!-- Métaux industriels -->
        <div class="glass-card p-5">
            <div class="flex items-center justify-between mb-4">
                <div class="flex items-center space-x-2">
                    <i class="fas fa-industry text-blue-500"></i>
                    <h3 class="font-semibold text-gray-300">MÉTAUX INDUSTRIELS</h3>
                </div>
                <span class="badge-metal badge-industrial">INDICES</span>
            </div>
            
            <div class="metal-grid">
                <div class="metal-item">
                    <div class="flex justify-between items-center">
                        <span class="font-medium">Cuivre</span>
                        <span class="metal-symbol">CU</span>
                    </div>
                    <div class="text-lg font-mono font-bold mt-1" x-text="(metals.industriels?.XCU?.prix || 4.25).toFixed(2) + ' USD'"></div>
                    <div class="text-xs" :class="(metals.industriels?.XCU?.variation || 0) >= 0 ? 'trend-up' : 'trend-down'"
                         x-text="((metals.industriels?.XCU?.variation || 0) > 0 ? '+' : '') + (metals.industriels?.XCU?.variation || 0).toFixed(1) + '%'"></div>
                </div>
                
                <div class="metal-item">
                    <div class="flex justify-between items-center">
                        <span class="font-medium">Zinc</span>
                        <span class="metal-symbol">ZN</span>
                    </div>
                    <div class="text-lg font-mono font-bold mt-1" x-text="(metals.industriels?.XZN?.prix || 2580).toFixed(2) + ' USD'"></div>
                    <div class="text-xs" :class="(metals.industriels?.XZN?.variation || 0) >= 0 ? 'trend-up' : 'trend-down'"
                         x-text="((metals.industriels?.XZN?.variation || 0) > 0 ? '+' : '') + (metals.industriels?.XZN?.variation || 0).toFixed(1) + '%'"></div>
                </div>
                
                <div class="metal-item">
                    <div class="flex justify-between items-center">
                        <span class="font-medium">Plomb</span>
                        <span class="metal-symbol">PB</span>
                    </div>
                    <div class="text-lg font-mono font-bold mt-1" x-text="(metals.industriels?.XPB?.prix || 2150).toFixed(2) + ' USD'"></div>
                    <div class="text-xs" :class="(metals.industriels?.XPB?.variation || 0) >= 0 ? 'trend-up' : 'trend-down'"
                         x-text="((metals.industriels?.XPB?.variation || 0) > 0 ? '+' : '') + (metals.industriels?.XPB?.variation || 0).toFixed(1) + '%'"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- ACTIONS -->
    <div class="glass-card p-5 mb-6">
        <div class="flex items-center justify-between mb-4">
            <div class="flex items-center space-x-2">
                <i class="fas fa-chart-simple text-emerald-500"></i>
                <h2 class="font-semibold text-gray-300">ACTIONS SUIVIES</h2>
            </div>
            <span class="text-sm text-gray-500" x-text="actions.length + ' valeurs'"></span>
        </div>
        
        <div id="actions-container" class="space-y-2 max-h-96 overflow-y-auto pr-2 custom-scrollbar"></div>
    </div>

    <!-- NEWS -->
    <div class="glass-card p-5">
        <div class="flex items-center space-x-2 mb-4">
            <i class="fas fa-newspaper text-blue-500"></i>
            <h2 class="font-semibold text-gray-300">ACTUALITÉS</h2>
        </div>
        <div id="news-container" class="space-y-3 max-h-64 overflow-y-auto pr-2 custom-scrollbar">
            <p class="text-center text-gray-500 py-4">Chargement...</p>
        </div>
    </div>
</div>

<script>
async function loadData() {
    try {const res = await fetch('https://benlouka062-pixel.github.io/bourse-casa-bot/data.json?t=' + Date.now());
        const data = await res.json();
        
        // Métaux
        window.metals = data.metaux || { precieux: {}, industriels: {} };
        
        // Actions sous forme de cartes
        let html = '';
        if (data.actions && data.actions.length > 0) {
            data.actions.forEach(a => {
                const variation = (Math.random() * 4 - 2).toFixed(1);
                html += `<div class="action-card" onclick="window.location.href='detail.html?symbol=${a.sym}'">
                    <div class="flex justify-between items-start">
                        <div>
                            <span class="font-bold text-emerald-500 text-lg">${a.sym}</span>
                            <span class="text-sm text-gray-500 ml-2">${a.nom || ''}</span>
                        </div>
                        <span class="font-mono text-lg font-bold">${a.prix?.toFixed(2) || '---'} DH</span>
                    </div>
                    <div class="flex justify-between items-center mt-3">
                        <span class="text-sm">Variation <span class="${variation >= 0 ? 'trend-up' : 'trend-down'} font-mono">${variation >= 0 ? '+' : ''}${variation}%</span></span>
                        <button class="alert-btn" onclick="event.stopPropagation();alert('🔔 Alerte pour ${a.sym} (à connecter)')">
                            <i class="fas fa-bell mr-1"></i>Alerte
                        </button>
                    </div>
                </div>`;
            });
        } else {
            html = '<p class="text-center text-gray-500 py-4">Aucune action disponible</p>';
        }
        document.getElementById('actions-container').innerHTML = html;
        
    } catch (e) {
        document.getElementById('actions-container').innerHTML = '<p class="text-center text-red-500 py-4">Erreur chargement</p>';
    }
}

async function loadNews() {
    try {
        const res = await fetch('https://api.rss2json.com/v1/api.json?rss_url=https://lematin.ma/rss');
        const data = await res.json();
        if (data.items) {
            let html = '';
            data.items.slice(0, 5).forEach(item => {
                html += `<div class="glass-card p-3">
                    <div class="text-sm font-medium">${item.title.substring(0, 60)}...</div>
                    <div class="text-xs text-gray-500 mt-1">Le Matin · ${new Date(item.pubDate).toLocaleDateString('fr-FR')}</div>
                </div>`;
            });
            document.getElementById('news-container').innerHTML = html;
        }
    } catch (e) {
        document.getElementById('news-container').innerHTML = '<p class="text-center text-gray-500 py-4">News temporairement indisponibles</p>';
    }
}

// Heures
function updateTime() {
    const now = new Date();
    const casablancaTime = new Date(now.getTime() + 3600000);
    const nyTime = new Date(now.toLocaleString('en-US', { timeZone: 'America/New_York' }));
    
    document.querySelector('[x-text="casablancaTime"]').textContent = 
        casablancaTime.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
    document.querySelector('[x-text="nyTime"]').textContent = 
        nyTime.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
}

// Alpine
document.addEventListener('alpine:init', () => {
    Alpine.store('metals', { precieux: {}, industriels: {} });
    
    Alpine.data('taoussiCapital', () => ({
        casablancaTime: '', nyTime: '', masi: '---', volume: '---', variation: '---', actions: [],
        metals: { precieux: {}, industriels: {} },
        init() {
            updateTime();
            setInterval(updateTime, 60000);
            loadData();
            loadNews();
            setInterval(loadData, 300000);
            setInterval(loadNews, 600000);
        }
    }));
});
</script>

<style>
.custom-scrollbar::-webkit-scrollbar { width: 6px; }
.custom-scrollbar::-webkit-scrollbar-track { background: #1a1e24; border-radius: 3px; }
.custom-scrollbar::-webkit-scrollbar-thumb { background: #2d3748; border-radius: 3px; }
.custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #00b8a9; }
</style>
</body>
</html>
