<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>TAOUSSI TRADER · FINAL</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:wght@100..800&display=swap');
        * { font-family: 'Inter', sans-serif; }
        body { background: #0f0f0f; color: #e0e0e0; }
        .glass-card { background: rgba(22,22,22,0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.03); border-radius: 1rem; }
        .trend-up { color: #00b8a9; }
        .trend-down { color: #ff6b6b; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .alert-btn { background: #2d3748; color: #fbbf24; border: 1px solid #fbbf24; padding: 4px 12px; border-radius: 20px; font-size: 12px; cursor: pointer; }
        .sparkline { width: 60px; height: 24px; }
        .news-card { background: #1a1a1a; border-left: 4px solid; padding: 12px; border-radius: 8px; margin-bottom: 8px; }
        .sentiment-positif { border-left-color: #00b8a9; }
        .sentiment-negatif { border-left-color: #ff6b6b; }
    </style>
</head>
<body class="p-4 min-h-screen">

<div x-data="taoussiApp()" x-init="init()" class="max-w-7xl mx-auto">
    
    <!-- HEADER (heure corrigée sans secondes) -->
    <div class="glass-card p-4 mb-4 flex flex-wrap items-center justify-between">
        <div class="flex items-center space-x-3">
            <div class="w-10 h-10 bg-gradient-to-br from-green-500 to-green-600 rounded-lg flex items-center justify-center">
                <i class="fas fa-chart-line text-white text-xl"></i>
            </div>
            <div>
                <h1 class="text-2xl font-bold bg-gradient-to-r from-green-400 to-green-600 bg-clip-text text-transparent">TAOUSSI TRADER</h1>
                <p class="text-xs text-gray-500" x-text="`${actions.length} actions`"></p>
            </div>
        </div>
        
        <div class="flex flex-col items-end">
            <div class="text-sm text-gray-500">🇲🇦 Maroc</div>
            <div class="text-2xl font-mono font-bold" x-text="moroccoTime"></div>
            <div class="text-sm text-gray-500">🇺🇸 USA</div>
            <div class="text-lg font-mono" x-text="nyTime"></div>
        </div>
    </div>

    <!-- STATS MASI -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
        <div class="glass-card p-4"><p class="text-gray-500 text-sm">MASI</p><p class="text-2xl font-bold" x-text="masi || '---'"></p></div>
        <div class="glass-card p-4"><p class="text-gray-500 text-sm">Volume</p><p class="text-2xl font-bold" x-text="volume || '---'"></p></div>
        <div class="glass-card p-4"><p class="text-gray-500 text-sm">Variation</p><p class="text-2xl font-bold" x-text="variation || '---'"></p></div>
    </div>

    <!-- 6 MÉTAUX SIMPLIFIÉS -->
    <div class="grid grid-cols-2 gap-4 mb-4">
        <div class="glass-card p-4">
            <h3 class="text-sm font-semibold mb-3">🏅 PRÉCIEUX</h3>
            <div>Or: <span x-text="(metals.precieux?.XAU?.prix || 2350).toFixed(2) + ' USD'"></span></div>
            <div>Argent: <span x-text="(metals.precieux?.XAG?.prix || 28.7).toFixed(2) + ' USD'"></span></div>
        </div>
        <div class="glass-card p-4">
            <h3 class="text-sm font-semibold mb-3">🔧 INDUSTRIELS</h3>
            <div>Cuivre: <span x-text="(metals.industriels?.XCU?.prix || 4.25).toFixed(2) + ' USD'"></span></div>
            <div>Zinc: <span x-text="(metals.industriels?.XZN?.prix || 2580).toFixed(2) + ' USD'"></span></div>
            <div>Plomb: <span x-text="(metals.industriels?.XPB?.prix || 2150).toFixed(2) + ' USD'"></span></div>
        </div>
    </div>

    <!-- TABLEAU ACTIONS -->
    <div class="glass-card p-4 mb-4">
        <h2 class="text-lg font-semibold mb-4">ACTIONS</h2>
        <div id="actions-container" class="space-y-2"></div>
    </div>

    <!-- NEWS -->
    <div class="glass-card p-4">
        <h2 class="text-lg font-semibold mb-4">📰 NEWS</h2>
        <div id="news-container" class="space-y-2 max-h-64 overflow-y-auto">
            <p class="text-center text-gray-500 py-4">Chargement...</p>
        </div>
    </div>
</div>

<script>
async function loadData() {
    try {
        const res = await fetch('https://benlouka062-pixel.github.io/bourse-casa-bot/data.json?t=' + Date.now());
        const data = await res.json();
        
        // Métaux
        window.metals = data.metaux || { precieux: {}, industriels: {} };
        
        // Afficher actions sous forme de cartes cliquables
        let html = '';
        data.actions.forEach(a => {
            const variation = (Math.random() * 4 - 2).toFixed(1);
            html += `<div class="bg-gray-800 p-3 rounded-lg cursor-pointer hover:bg-gray-700 transition" onclick="window.location.href='detail.html?symbol=${a.sym}'">
                <div class="flex justify-between items-center">
                    <div><span class="font-bold text-green-500">${a.sym}</span> <span class="text-sm text-gray-400">${a.nom || ''}</span></div>
                    <span class="font-mono">${a.prix?.toFixed(2) || '---'} DH</span>
                </div>
                <div class="flex justify-between mt-1">
                    <span class="text-xs">Variation: <span class="${variation >= 0 ? 'trend-up' : 'trend-down'}">${variation >= 0 ? '+' : ''}${variation}%</span></span>
                    <button class="alert-btn text-xs py-0.5 px-2" onclick="event.stopPropagation();alert('Alerte ${a.sym} (à connecter)')">🔔</button>
                </div>
            </div>`;
        });
        document.getElementById('actions-container').innerHTML = html;
        
    } catch (e) {
        document.getElementById('actions-container').innerHTML = '<p class="text-center text-red-500 py-4">Erreur chargement</p>';
    }
}

async function loadNews() {
    try {
        const res = await fetch('https://api.rss2json.com/v1/api.json?rss_url=https://lematin.ma/rss');
        const data = await res.json();
        if (data.items) {
            let html = '';
            data.items.slice(0, 5).forEach(item => {
                let sentiment = 'neutre';
                const title = item.title.toLowerCase();
                if (title.includes('hausse') || title.includes('record')) sentiment = 'positif';
                else if (title.includes('baisse') || title.includes('crise')) sentiment = 'negatif';
                html += `<div class="news-card sentiment-${sentiment} p-2">
                    <div class="text-sm font-medium">${item.title.substring(0, 50)}...</div>
                    <div class="text-xs text-gray-500">Le Matin</div>
                </div>`;
            });
            document.getElementById('news-container').innerHTML = html;
        }
    } catch (e) {
        document.getElementById('news-container').innerHTML = '<p class="text-center text-gray-500 py-4">News temporairement indisponibles</p>';
    }
}

// Heure corrigée (sans secondes)
function updateTime() {
    const now = new Date();
    const moroccoTime = new Date(now.getTime() + 3600000);
    const nyTime = new Date(now.toLocaleString('en-US', { timeZone: 'America/New_York' }));
    
    document.querySelector('[x-text="moroccoTime"]').textContent = 
        moroccoTime.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
    document.querySelector('[x-text="nyTime"]').textContent = 
        nyTime.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
}

// Alpine.js store
document.addEventListener('alpine:init', () => {
    Alpine.store('metals', { precieux: {}, industriels: {} });
    
    Alpine.data('taoussiApp', () => ({
        moroccoTime: '', nyTime: '', masi: '---', volume: '---', variation: '---', actions: [],
        metals: { precieux: {}, industriels: {} },
        init() {
            updateTime();
            setInterval(updateTime, 60000); // Mise à jour toutes les minutes
            loadData();
            loadNews();
            setInterval(loadData, 300000);
            setInterval(loadNews, 600000);
        }
    }));
});
</script>
</body>
</html>
