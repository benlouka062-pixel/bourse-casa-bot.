<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>TAOUSSI TRADER · Dashboard Pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #0b0e14;
            color: #f0f4fa;
            padding: 20px;
            min-height: 100vh;
        }

        .glass {
            background: rgba(20, 30, 45, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 255, 180, 0.15);
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
        }

        .card {
            background: rgba(12, 18, 28, 0.8);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            padding: 20px;
            border: 1px solid rgba(0, 255, 200, 0.15);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.8);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .title {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #00ffb4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .source-badge {
            background: rgba(0, 255, 180, 0.1);
            color: #00ffb4;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 14px;
            border: 1px solid rgba(0, 255, 180, 0.3);
        }

        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 20px;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        .stat-card {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 16px;
            text-align: center;
        }

        .stat-label {
            color: #888;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 26px;
            font-weight: 700;
            margin-top: 8px;
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 40px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge-achat {
            background: rgba(0, 255, 157, 0.2);
            color: #00ff9d;
            border: 1px solid #00ff9d;
        }

        .badge-vente {
            background: rgba(255, 94, 124, 0.2);
            color: #ff5e7c;
            border: 1px solid #ff5e7c;
        }

        .badge-attente {
            background: rgba(255, 255, 255, 0.1);
            color: #aaa;
            border: 1px solid #333;
        }

        .badge-support {
            background: rgba(0, 100, 255, 0.2);
            color: #4da6ff;
            border: 1px solid #4da6ff;
        }

        .badge-resistance {
            background: rgba(255, 165, 0, 0.2);
            color: #ffaa33;
            border: 1px solid #ffaa33;
        }

        .action-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .action-row:last-child {
            border-bottom: none;
        }

        .action-info {
            flex: 2;
        }

        .action-symbol {
            font-weight: 700;
            font-size: 16px;
        }

        .action-name {
            color: #888;
            font-size: 12px;
            margin-left: 8px;
        }

        .action-price {
            font-weight: 700;
            font-size: 18px;
            text-align: right;
        }

        .action-details {
            display: flex;
            gap: 16px;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .level-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }

        .proximity-badge {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 20px;
            background: rgba(255,255,255,0.05);
        }

        .footer {
            margin-top: 30px;
            text-align: center;
            color: #666;
            font-size: 12px;
        }

        .refresh-btn {
            background: #00ffb4;
            color: #000;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            margin: 20px auto;
            display: block;
            font-size: 16px;
        }

        @media (max-width: 600px) {
            .grid-3, .grid-2 {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <span class="title">📊 TAOUSSI TRADER · PRO</span>
        <span class="source-badge" id="source-badge">⏳ Chargement...</span>
    </div>

    <!-- Stats marché -->
    <div class="grid-3">
        <div class="stat-card">
            <div class="stat-label">MASI</div>
            <div class="stat-value" id="masi">---</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Volume</div>
            <div class="stat-value" id="volume">---</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Variation</div>
            <div class="stat-value" id="variation">---</div>
        </div>
    </div>

    <!-- Liste des actions -->
    <div class="card">
        <div style="display: flex; justify-content: space-between; margin-bottom: 16px;">
            <span style="font-weight: 600;">🔥 SUIVI ACTIONS</span>
            <span style="color: #00ffb4;" id="update-time"></span>
        </div>
        <div id="actions-container">
            <div style="text-align: center; padding: 40px; color: #666;">
                Chargement des données...
            </div>
        </div>
    </div>

    <!-- Bouton rafraîchir -->
    <button class="refresh-btn" onclick="loadData()">⟳ RAFRAÎCHIR</button>

    <div class="footer">
        Mise à jour automatique toutes les 5 min • Données réelles 24/7
    </div>

    <script>
        async function loadData() {
            try {
                const response = await fetch('/bourse-casa-bot/data.json');
                const data = await response.json();
                
                // Mise à jour des infos générales
                document.getElementById('source-badge').textContent = data.source || 'Source inconnue';
                document.getElementById('update-time').textContent = data.date || '';
                document.getElementById('masi').textContent = data.masi ? data.masi.toFixed(2) : '---';
                document.getElementById('volume').textContent = data.volume || '---';
                document.getElementById('variation').textContent = data.variation || '---';
                
                // Affichage des actions
                const container = document.getElementById('actions-container');
                
                if (!data.actions || data.actions.length === 0) {
                    container.innerHTML = '<div style="text-align: center; padding: 40px; color: #666;">Aucune donnée disponible</div>';
                    return;
                }
                
                let html = '';
                
                data.actions.forEach(a => {
                    // Badge signal
                    let signalBadge = '';
                    if (a.signal === 'ACHAT') signalBadge = '<span class="badge badge-achat">🟢 ACHAT</span>';
                    else if (a.signal === 'VENTE') signalBadge = '<span class="badge badge-vente">🔴 VENTE</span>';
                    else signalBadge = '<span class="badge badge-attente">⚪ ATTENTE</span>';
                    
                    // Badges proximité supports/résistances
                    let proximityHtml = '';
                    if (a.support && a.dist_support !== null && Math.abs(a.dist_support) < 3) {
                        proximityHtml += `<span class="badge badge-support">⬇️ Support à ${a.dist_support}%</span>`;
                    }
                    if (a.resistance && a.dist_resistance !== null && Math.abs(a.dist_resistance) < 3) {
                        proximityHtml += `<span class="badge badge-resistance">⬆️ Résistance à ${a.dist_resistance}%</span>`;
                    }
                    
                    html += `
                        <div class="action-row">
                            <div class="action-info">
                                <div>
                                    <span class="action-symbol">${a.sym}</span>
                                    <span class="action-name">${a.nom || ''}</span>
                                </div>
                                <div class="action-details">
                                    <div class="level-indicator">
                                        <span>📊 RSI: ${a.rsi || '--'}</span>
                                    </div>
                                    ${a.support ? `<div class="level-indicator"><span>🛡️ S: ${a.support}</span></div>` : ''}
                                    ${a.resistance ? `<div class="level-indicator"><span>🧱 R: ${a.resistance}</span></div>` : ''}
                                    <div class="proximity-badge">${signalBadge}</div>
                                </div>
                                <div style="margin-top: 8px; display: flex; gap: 8px;">
                                    ${proximityHtml}
                                </div>
                            </div>
                            <div class="action-price">
                                ${a.prix ? a.prix.toFixed(2) + ' DH' : '--'}
                            </div>
                        </div>
                    `;
                });
                
                container.innerHTML = html;
                
            } catch (error) {
                console.error('Erreur:', error);
                document.getElementById('actions-container').innerHTML = 
                    '<div style="text-align: center; padding: 40px; color: #ff5e7c;">❌ Erreur de chargement</div>';
            }
        }

        // Chargement initial
        loadData();
        
        // Rechargement auto toutes les 5 minutes
        setInterval(loadData, 300000);
    </script>
</body>
</html>
