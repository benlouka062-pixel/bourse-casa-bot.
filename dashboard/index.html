<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>TAOUSSI TRADER · TERMINAL PRO</title>
    
    <!-- Chart.js pour les graphiques -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Font Awesome pour les icônes -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- html2pdf pour export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background: #0a0c10;
            color: #e0e0e0;
            padding: 16px;
            min-height: 100vh;
        }

        /* ===== DESIGN SYSTEM ===== */
        :root {
            --primary: #00ffb4;
            --primary-dark: #00cc90;
            --secondary: #ffaa33;
            --danger: #ff5e7c;
            --success: #00ff9d;
            --warning: #ffd700;
            --info: #4dc3ff;
            --dark-1: #0f1217;
            --dark-2: #1a1e2a;
            --dark-3: #252b38;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(0, 255, 180, 0.1);
        }

        /* ===== COMPOSANTS FUTURISTES ===== */
        .glass-panel {
            background: var(--dark-2);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
        }

        .glass-card {
            background: linear-gradient(145deg, rgba(26, 30, 42, 0.9), rgba(15, 18, 23, 0.95));
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 255, 180, 0.1);
            border-radius: 20px;
            padding: 20px;
        }

        /* ===== HEADER ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .title {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .market-status {
            background: var(--dark-3);
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 14px;
            border: 1px solid var(--primary);
            color: var(--primary);
        }

        /* ===== STATS GLOBALES ===== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-item {
            background: var(--dark-2);
            border-radius: 20px;
            padding: 16px;
            text-align: center;
            border: 1px solid var(--glass-border);
        }

        .stat-label {
            color: #888;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary);
        }

        /* ===== GRILLE D'ACTIONS (BOUTONS CLIQUABLES) ===== */
        .actions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 24px;
        }

        .action-button {
            background: var(--dark-3);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 16px 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
            position: relative;
            overflow: hidden;
        }

        .action-button:hover {
            transform: translateY(-2px);
            border-color: var(--primary);
            box-shadow: 0 10px 20px rgba(0, 255, 180, 0.1);
        }

        .action-button.selected {
            border: 2px solid var(--primary);
            background: linear-gradient(145deg, var(--dark-3), #1f2535);
        }

        .action-symbol {
            font-size: 18px;
            font-weight: 700;
            color: #fff;
        }

        .action-name {
            font-size: 12px;
            color: #888;
            margin: 4px 0;
        }

        .action-price {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary);
            margin: 8px 0 4px;
        }

        .action-variation {
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .variation-positive { color: var(--success); }
        .variation-negative { color: var(--danger); }

        .signal-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            font-size: 16px;
        }

        /* ===== PANEL DE DÉTAILS ===== */
        .details-panel {
            margin-bottom: 24px;
            display: none;
        }

        .details-panel.visible {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .panel-title {
            font-size: 24px;
            font-weight: 700;
        }

        .close-btn {
            background: none;
            border: none;
            color: #888;
            font-size: 24px;
            cursor: pointer;
        }

        /* ===== GRILLE D'INDICATEURS ===== */
        .indicators-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }

        .indicator-card {
            background: var(--dark-2);
            border-radius: 16px;
            padding: 16px;
            border: 1px solid var(--glass-border);
        }

        .indicator-title {
            color: #888;
            font-size: 12px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .indicator-value {
            font-size: 24px;
            font-weight: 700;
        }

        .indicator-sub {
            font-size: 13px;
            color: #888;
            margin-top: 4px;
        }

        /* ===== GRAPHIQUE ===== */
        .chart-container {
            height: 300px;
            margin: 20px 0;
            padding: 16px;
            background: var(--dark-2);
            border-radius: 20px;
        }

        /* ===== MÉTAUX ===== */
        .metals-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-top: 20px;
        }

        .metal-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid var(--glass-border);
        }

        /* ===== BOUTONS ===== */
        .button-group {
            display: flex;
            gap: 12px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 40px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }

        .btn-primary {
            background: var(--primary);
            color: #000;
        }

        .btn-secondary {
            background: var(--dark-3);
            color: #fff;
            border: 1px solid var(--glass-border);
        }

        .btn-export {
            background: var(--secondary);
            color: #000;
        }

        /* ===== BADGES ===== */
        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            margin-right: 4px;
        }

        .badge-achat { background: rgba(0, 255, 157, 0.2); color: #00ff9d; border: 1px solid #00ff9d; }
        .badge-vente { background: rgba(255, 94, 124, 0.2); color: #ff5e7c; border: 1px solid #ff5e7c; }
        .badge-breakout { background: rgba(255, 215, 0, 0.2); color: #ffd700; border: 1px solid #ffd700; animation: pulse 1.5s infinite; }
        .badge-divergence { background: rgba(77, 195, 255, 0.2); color: #4dc3ff; border: 1px solid #4dc3ff; }
        .badge-info { background: rgba(255, 255, 255, 0.1); color: #aaa; border: 1px solid #333; }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 600px) {
            .stats-grid { grid-template-columns: 1fr; }
            .actions-grid { grid-template-columns: repeat(2, 1fr); }
            .metals-section { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="title">⚡ TAOUSSI TRADER · PRO</div>
        <div class="market-status" id="market-status">⏳ Chargement...</div>
    </div>

    <!-- Stats globales -->
    <div class="stats-grid">
        <div class="stat-item">
            <div class="stat-label">MASI</div>
            <div class="stat-value" id="masi">---</div>
        </div>
        <div class="stat-item">
            <div class="stat-label">VOLUME</div>
            <div class="stat-value" id="volume">---</div>
        </div>
        <div class="stat-item">
            <div class="stat-label">VARIATION</div>
            <div class="stat-value" id="variation">---</div>
        </div>
    </div>

    <!-- Grille d'actions (boutons cliquables) -->
    <h3 style="margin-bottom: 12px; color: #888;">📈 ACTIONS</h3>
    <div class="actions-grid" id="actions-grid"></div>

    <!-- Panneau de détails (apparaît au clic) -->
    <div class="details-panel glass-card" id="details-panel">
        <div class="panel-header">
            <div class="panel-title" id="detail-title">Sélectionne une action</div>
            <button class="close-btn" onclick="closeDetails()"><i class="fas fa-times"></i></button>
        </div>

        <!-- Badges signal -->
        <div id="detail-badges" style="margin-bottom: 16px;"></div>

        <!-- Grille d'indicateurs -->
        <div class="indicators-grid" id="indicators-grid"></div>

        <!-- Graphique -->
        <div class="chart-container">
            <canvas id="priceChart"></canvas>
        </div>

        <!-- Métaux corrélés -->
        <div id="metaux-correlation" style="margin-top: 20px;"></div>
    </div>

    <!-- Métaux précieux & industriels -->
    <h3 style="margin: 20px 0 12px; color: #888;">🏅 MÉTAUX</h3>
    <div class="metals-section">
        <div class="glass-card" id="metaux-precieux">
            <h4 style="color: #ffd700; margin-bottom: 12px;">Métaux précieux</h4>
            <div id="precieux-content">Chargement...</div>
        </div>
        <div class="glass-card" id="metaux-industriels">
            <h4 style="color: #00ffb4; margin-bottom: 12px;">Métaux industriels</h4>
            <div id="industriels-content">Chargement...</div>
        </div>
    </div>

    <!-- Boutons d'action -->
    <div class="button-group">
        <button class="btn btn-primary" onclick="refreshData()"><i class="fas fa-sync-alt"></i> Rafraîchir</button>
        <button class="btn btn-export" onclick="exportPDF()"><i class="fas fa-file-pdf"></i> Export PDF</button>
    </div>

    <script>
        // ========== DONNÉES GLOBALES ==========
        let allData = null;
        let selectedAction = null;
        let chart = null;

        // ========== CHARGEMENT DES DONNÉES ==========
        async function loadData() {
            try {
                const response = await fetch('https://benlouka062-pixel.github.io/bourse-casa-bot./data.json');
                allData = await response.json();
                
                // Mise à jour stats globales
                document.getElementById('market-status').textContent = allData.source || 'Source inconnue';
                document.getElementById('masi').textContent = allData.masi ? allData.masi.toFixed(2) : '---';
                document.getElementById('volume').textContent = allData.volume || '---';
                document.getElementById('variation').textContent = allData.variation || '---';
                
                // Affichage des actions
                renderActionsGrid();
                
                // Affichage des métaux
                renderMetals();
                
                // Si une action était sélectionnée, on met à jour ses détails
                if (selectedAction) {
                    const newSelected = allData.actions.find(a => a.sym === selectedAction.sym);
                    if (newSelected) {
                        selectedAction = newSelected;
                        showActionDetails(selectedAction);
                    }
                }
                
            } catch (error) {
                console.error('Erreur chargement:', error);
            }
        }

        // ========== GRILLE D'ACTIONS ==========
        function renderActionsGrid() {
            if (!allData || !allData.actions) return;
            
            const grid = document.getElementById('actions-grid');
            grid.innerHTML = '';
            
            allData.actions.forEach(action => {
                const prix = action.prix || 0;
                const signal = action.signal || 'ATTENTE';
                
                // Emoji selon signal
                let signalEmoji = '⚪';
                let signalClass = '';
                if (signal === 'ACHAT') { signalEmoji = '🟢'; }
                else if (signal === 'VENTE') { signalEmoji = '🔴'; }
                else if (signal === 'BREAKOUT') { signalEmoji = '🚀'; }
                else if (signal === 'DIVERGENCE') { signalEmoji = '📊'; }
                
                const btn = document.createElement('div');
                btn.className = `action-button ${selectedAction?.sym === action.sym ? 'selected' : ''}`;
                btn.onclick = () => selectAction(action);
                
                btn.innerHTML = `
                    <div class="action-symbol">${action.sym}</div>
                    <div class="action-name">${action.nom || ''}</div>
                    <div class="action-price">${prix.toFixed(2)} DH</div>
                    <span class="signal-badge">${signalEmoji}</span>
                `;
                
                grid.appendChild(btn);
            });
        }

        // ========== SÉLECTION D'UNE ACTION ==========
        function selectAction(action) {
            selectedAction = action;
            renderActionsGrid(); // Met à jour la classe "selected"
            showActionDetails(action);
        }

        // ========== AFFICHAGE DES DÉTAILS ==========
        function showActionDetails(action) {
            const panel = document.getElementById('details-panel');
            panel.classList.add('visible');
            
            document.getElementById('detail-title').innerHTML = `
                ${action.sym} · ${action.nom || ''}
                <span style="font-size: 16px; color: var(--primary); margin-left: 12px;">${action.prix.toFixed(2)} DH</span>
            `;
            
            // ===== BADGES SIGNAL =====
            let badgesHtml = '';
            
            // Signal principal
            if (action.signal === 'ACHAT') badgesHtml += '<span class="badge badge-achat">🟢 ACHAT</span> ';
            else if (action.signal === 'VENTE') badgesHtml += '<span class="badge badge-vente">🔴 VENTE</span> ';
            else if (action.signal === 'BREAKOUT') badgesHtml += '<span class="badge badge-breakout">🚀 BREAKOUT</span> ';
            else if (action.signal === 'DIVERGENCE') badgesHtml += '<span class="badge badge-divergence">📊 DIVERGENCE</span> ';
            
            // Breakout détaillé
            if (action.breakout) {
                badgesHtml += `<span class="badge badge-breakout">📊 Vol x${action.breakout.volume_ratio}</span> `;
            }
            
            // Divergence détaillée
            if (action.divergence) {
                const divType = action.divergence.type === 'DIVERGENCE_HAUSSIERE' ? '📈 DIV HAUSSIÈRE' : '📉 DIV BAISSIÈRE';
                badgesHtml += `<span class="badge badge-divergence">${divType}</span> `;
            }
            
            // Proximité supports/résistances
            if (action.dist_support && Math.abs(action.dist_support) < 3) {
                badgesHtml += `<span class="badge badge-info">⬇️ Support -${action.dist_support.toFixed(1)}%</span> `;
            }
            if (action.dist_resistance && Math.abs(action.dist_resistance) < 3) {
                badgesHtml += `<span class="badge badge-info">⬆️ Résistance +${action.dist_resistance.toFixed(1)}%</span> `;
            }
            
            document.getElementById('detail-badges').innerHTML = badgesHtml;
            
            // ===== INDICATEURS =====
            const indicatorsGrid = document.getElementById('indicators-grid');
            
            // Calculs d'indicateurs simulés (seront remplacés par les vraies données)
            const rsi = action.rsi || 50;
            const support = action.support || (action.prix * 0.97).toFixed(2);
            const resistance = action.resistance || (action.prix * 1.03).toFixed(2);
            const macd = (Math.random() * 2 - 1).toFixed(2);
            const signalMacd = (Math.random() * 2 - 1).toFixed(2);
            const bbHaut = (action.prix * 1.05).toFixed(2);
            const bbBas = (action.prix * 0.95).toFixed(2);
            const volume = Math.floor(Math.random() * 50000 + 20000);
            const volumeMoyen = Math.floor(volume * 0.8);
            
            indicatorsGrid.innerHTML = `
                <div class="indicator-card">
                    <div class="indicator-title"><i class="fas fa-chart-line"></i> RSI</div>
                    <div class="indicator-value">${rsi}</div>
                    <div class="indicator-sub">${rsi < 30 ? 'Survendu' : rsi > 70 ? 'Surachat' : 'Neutre'}</div>
                </div>
                <div class="indicator-card">
                    <div class="indicator-title"><i class="fas fa-arrow-down"></i> Support</div>
                    <div class="indicator-value">${support}</div>
                    <div class="indicator-sub">Distance: ${action.dist_support?.toFixed(1) || '0'}%</div>
                </div>
                <div class="indicator-card">
                    <div class="indicator-title"><i class="fas fa-arrow-up"></i> Résistance</div>
                    <div class="indicator-value">${resistance}</div>
                    <div class="indicator-sub">Distance: ${action.dist_resistance?.toFixed(1) || '0'}%</div>
                </div>
                <div class="indicator-card">
                    <div class="indicator-title"><i class="fas fa-chart-bar"></i> MACD</div>
                    <div class="indicator-value">${macd}</div>
                    <div class="indicator-sub">Signal: ${signalMacd}</div>
                </div>
                <div class="indicator-card">
                    <div class="indicator-title"><i class="fas fa-circle"></i> Bollinger</div>
                    <div class="indicator-value">H:${bbHaut}</div>
                    <div class="indicator-sub">B:${bbBas}</div>
                </div>
                <div class="indicator-card">
                    <div class="indicator-title"><i class="fas fa-chart-simple"></i> Volume</div>
                    <div class="indicator-value">${(volume/1000).toFixed(0)}k</div>
                    <div class="indicator-sub">Moy: ${(volumeMoyen/1000).toFixed(0)}k</div>
                </div>
            `;
            
            // ===== MÉTAUX CORRÉLÉS =====
            const metauxDiv = document.getElementById('metaux-correlation');
            if (['MNG', 'SMI', 'CMT'].includes(action.sym) && allData.metaux) {
                let html = '<h4 style="color: #ffd700; margin: 20px 0 12px;">🔗 Corrélation métaux</h4><div style="display: grid; gap: 8px;">';
                
                if (action.sym === 'MNG') {
                    if (allData.metaux.precieux?.XAU) html += `<div class="metal-item"><span>Or</span> <span>${allData.metaux.precieux.XAU.prix} $</span></div>`;
                    if (allData.metaux.precieux?.XAG) html += `<div class="metal-item"><span>Argent</span> <span>${allData.metaux.precieux.XAG.prix} $</span></div>`;
                } else if (action.sym === 'SMI') {
                    if (allData.metaux.precieux?.XAG) html += `<div class="metal-item"><span>Argent</span> <span>${allData.metaux.precieux.XAG.prix} $</span></div>`;
                } else if (action.sym === 'CMT') {
                    if (allData.metaux.industriels?.XCU) html += `<div class="metal-item"><span>Cuivre</span> <span>${allData.metaux.industriels.XCU.prix} $</span></div>`;
                    if (allData.metaux.precieux?.XAG) html += `<div class="metal-item"><span>Argent</span> <span>${allData.metaux.precieux.XAG.prix} $</span></div>`;
                }
                
                html += '</div>';
                metauxDiv.innerHTML = html;
            } else {
                metauxDiv.innerHTML = '';
            }
            
            // ===== GRAPHIQUE =====
            updateChart(action);
        }

        // ========== GRAPHIQUE ==========
        function updateChart(action) {
            if (!action) return;
            
            // Génération de données simulées pour le graphique
            const labels = [];
            const data = [];
            const today = new Date();
            
            for (let i = 9; i >= 0; i--) {
                const d = new Date(today);
                d.setDate(d.getDate() - i);
                labels.push(d.toLocaleDateString('fr-FR', { weekday: 'short' }));
                
                // Simuler une variation autour du prix actuel
                const variation = (Math.random() * 0.06 - 0.03) * action.prix;
                const val = action.prix * (1 + (i-5)*0.01) + variation;
                data.push(Math.max(val, action.prix * 0.85));
            }
            
            if (chart) chart.destroy();
            
            const ctx = document.getElementById('priceChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: `${action.sym} - Prix`,
                        data: data,
                        borderColor: '#00ffb4',
                        backgroundColor: 'rgba(0, 255, 180, 0.1)',
                        tension: 0.4,
                        fill: true,
                        pointBackgroundColor: '#00ffb4',
                        pointBorderColor: '#fff',
                        pointRadius: 3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: { mode: 'index', intersect: false }
                    },
                    scales: {
                        y: { 
                            grid: { color: '#333' }, 
                            ticks: { color: '#888' },
                            beginAtZero: false
                        },
                        x: { 
                            grid: { display: false }, 
                            ticks: { color: '#888' }
                        }
                    }
                }
            });
        }

        // ========== MÉTAUX ==========
        function renderMetals() {
            if (!allData || !allData.metaux) {
                // Données simulées si pas encore disponibles
                document.getElementById('precieux-content').innerHTML = `
                    <div class="metal-item"><span>Or</span> <span>2350.50 $ <span style="color:#0f0;">+0.8%</span></span></div>
                    <div class="metal-item"><span>Argent</span> <span>28.75 $ <span style="color:#0f0;">+1.2%</span></span></div>
                `;
                document.getElementById('industriels-content').innerHTML = `
                    <div class="metal-item"><span>Cuivre</span> <span>4.25 $ <span style="color:#0f0;">+0.3%</span></span></div>
                    <div class="metal-item"><span>Plomb</span> <span>2150 $ <span style="color:#f00;">-0.2%</span></span></div>
                    <div class="metal-item"><span>Zinc</span> <span>2580 $ <span style="color:#0f0;">+0.5%</span></span></div>
                `;
                return;
            }
            
            // Métaux précieux
            let precieuxHtml = '';
            for (let [key, m] of Object.entries(allData.metaux.precieux || {})) {
                const variation = m.variation_pct || 0;
                precieuxHtml += `
                    <div class="metal-item">
                        <span>${m.nom}</span>
                        <span>${m.prix} ${m.unite} <span style="color: ${variation > 0 ? '#0f0' : '#f00'}">${variation > 0 ? '+' : ''}${variation}%</span></span>
                    </div>
                `;
            }
            document.getElementById('precieux-content').innerHTML = precieuxHtml || 'Aucune donnée';
            
            // Métaux industriels
            let industrielsHtml = '';
            for (let [key, m] of Object.entries(allData.metaux.industriels || {})) {
                const variation = m.variation_pct || 0;
                industrielsHtml += `
                    <div class="metal-item">
                        <span>${m.nom}</span>
                        <span>${m.prix} ${m.unite} <span style="color: ${variation > 0 ? '#0f0' : '#f00'}">${variation > 0 ? '+' : ''}${variation}%</span></span>
                    </div>
                `;
            }
            document.getElementById('industriels-content').innerHTML = industrielsHtml || 'Aucune donnée';
        }

        // ========== FERMER LES DÉTAILS ==========
        function closeDetails() {
            document.getElementById('details-panel').classList.remove('visible');
            selectedAction = null;
        }

        // ========== RAFRAÎCHIR ==========
        function refreshData() {
            loadData();
        }

        // ========== EXPORT PDF ==========
        function exportPDF() {
            const element = document.body;
            html2pdf().from(element).set({
                margin: [0.5, 0.5, 0.5, 0.5],
                filename: `taoussi-terminal-${new Date().toISOString().slice(0,10)}.pdf`,
                html2canvas: { scale: 2 },
                jsPDF: { orientation: 'landscape' }
            }).save();
        }

        // ========== INIT ==========
        loadData();
        setInterval(loadData, 300000); // Rafraîchit toutes les 5 min
    </script>
</body>
</html>
