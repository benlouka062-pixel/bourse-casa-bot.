<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>TAOUSSI TRADER </title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js pour les graphiques -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Alpine.js pour l'interactivité -->
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <!-- Font Awesome pour les icônes -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        * { font-family: 'Inter', sans-serif; }
        body { background: #0a0a0a; }
        
        .glass-card { 
            background: rgba(26, 26, 26, 0.95); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 1rem;
        }
        
        .trend-up { color: #10b981; }
        .trend-down { color: #ef4444; }
        
        .badge-reel {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
            border: 1px solid #10b981;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 10px;
        }
        
        .badge-fallback {
            background: rgba(255, 255, 255, 0.1);
            color: #aaa;
            border: 1px solid #333;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 10px;
        }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1a1a1a; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #10b981; }
        
        .chart-container {
            position: relative;
            height: 300px;
            width: 100%;
            margin: 20px 0;
        }
        
        .indicator-selector {
            display: flex;
            gap: 8px;
            margin: 10px 0;
            flex-wrap: wrap;
        }
        
        .indicator-btn {
            background: #1f2937;
            color: #9ca3af;
            border: 1px solid #374151;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .indicator-btn.active {
            background: #10b981;
            color: white;
            border-color: #10b981;
        }
        
        .indicator-btn:hover {
            background: #374151;
        }
    </style>
</head>
<body class="text-gray-200 p-4 min-h-screen custom-scrollbar">

<div x-data="taoussiMachine()" x-init="init()" class="max-w-7xl mx-auto">
    
    <!-- HEADER -->
    <div class="glass-card p-4 mb-4 flex flex-wrap items-center justify-between">
        <div class="flex items-center space-x-3">
            <div class="w-10 h-10 bg-gradient-to-br from-green-500 to-green-600 rounded-lg flex items-center justify-center">
                <i class="fas fa-chart-line text-white text-xl"></i>
            </div>
            <div>
                <h1 class="text-2xl font-bold bg-gradient-to-r from-green-400 to-green-600 bg-clip-text text-transparent">
                    TAOUSSI TRADER
                </h1>
                <p class="text-xs text-gray-500" x-text="`${actions.length} actions · Or/Argent RÉELS`"></p>
            </div>
        </div>
        
        <div class="flex items-center space-x-4">
            <div class="text-right">
                <div class="text-sm text-gray-500">Maroc</div>
                <div class="text-2xl font-mono font-bold" x-text="moroccoTime"></div>
            </div>
            <button @click="refreshData" class="bg-gray-800 hover:bg-gray-700 p-3 rounded-xl transition-all hover:rotate-180 duration-500">
                <i class="fas fa-sync-alt" :class="{ 'animate-spin': loading }"></i>
            </button>
        </div>
    </div>

    <!-- STATS MASI -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
        <div class="glass-card p-4">
            <p class="text-gray-500 text-sm">MASI</p>
            <p class="text-2xl font-bold" x-text="masi || '---'"></p>
        </div>
        <div class="glass-card p-4">
            <p class="text-gray-500 text-sm">Volume</p>
            <p class="text-2xl font-bold" x-text="volume || '---'"></p>
        </div>
        <div class="glass-card p-4">
            <p class="text-gray-500 text-sm">Variation</p>
            <p class="text-2xl font-bold" x-text="variation || '---'"></p>
        </div>
    </div>

    <!-- GRILLE DES ACTIONS (CLIQUABLES) -->
    <div class="glass-card p-4 mb-4">
        <h2 class="text-lg font-semibold mb-4 flex items-center">
            <i class="fas fa-chart-simple text-green-500 mr-2"></i>
            ACTIONS
            <span class="text-xs text-gray-500 ml-2">(cliquez pour voir les graphiques)</span>
        </h2>
        
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3">
            <template x-for="action in actions" :key="action.sym">
                <div @click="selectAction(action)" 
                     class="bg-gray-800/50 hover:bg-gray-800 p-4 rounded-xl border border-gray-700 cursor-pointer transition-all hover:scale-105">
                    
                    <div class="flex justify-between items-start">
                        <div>
                            <span class="font-bold text-green-500 text-lg" x-text="action.sym"></span>
                            <span class="text-xs text-gray-500 ml-2" x-text="action.nom?.substring(0,8)"></span>
                        </div>
                        <span :class="action.source === 'RÉEL' ? 'badge-reel' : 'badge-fallback'" 
                              x-text="action.source === 'RÉEL' ? 'RÉEL' : 'TEMP'"></span>
                    </div>
                    
                    <div class="text-2xl font-mono mt-2" x-text="action.prix?.toFixed(2) + ' DH'"></div>
                    
                    <div class="flex justify-between mt-3 text-sm">
                        <span>RSI: <span :class="action.rsi > 70 ? 'trend-up' : action.rsi < 30 ? 'trend-down' : ''" 
                                      x-text="action.rsi"></span></span>
                        <span :class="action.signal === 'ACHAT' ? 'text-green-500 font-bold' : 
                                     action.signal === 'VENTE' ? 'text-red-500 font-bold' : ''"
                              x-text="action.signal"></span>
                    </div>
                </div>
            </template>
        </div>
    </div>

    <!-- PANEL DE GRAPHIQUES (apparaît quand on clique) -->
    <div x-show="selectedAction" class="glass-card p-4 mb-4" x-transition>
        <div class="flex justify-between items-start mb-4">
            <div>
                <h2 class="text-xl font-bold" x-text="selectedAction?.sym + ' · ' + selectedAction?.nom"></h2>
                <p class="text-sm text-gray-500" x-text="'Prix: ' + selectedAction?.prix?.toFixed(2) + ' DH'"></p>
            </div>
            <button @click="closeDetails" class="text-gray-500 hover:text-gray-300">
                <i class="fas fa-times"></i>
            </button>
        </div>
        
        <!-- Sélecteur d'indicateurs -->
        <div class="indicator-selector">
            <button class="indicator-btn" :class="{ 'active': selectedIndicator === 'prix' }" @click="setIndicator('prix')">Prix</button>
            <button class="indicator-btn" :class="{ 'active': selectedIndicator === 'rsi' }" @click="setIndicator('rsi')">RSI</button>
            <button class="indicator-btn" :class="{ 'active': selectedIndicator === 'macd' }" @click="setIndicator('macd')">MACD</button>
            <button class="indicator-btn" :class="{ 'active': selectedIndicator === 'bollinger' }" @click="setIndicator('bollinger')">Bollinger</button>
            <button class="indicator-btn" :class="{ 'active': selectedIndicator === 'volume' }" @click="setIndicator('volume')">Volume</button>
        </div>
        
        <!-- Zone du graphique -->
        <div class="chart-container">
            <canvas x-ref="chartCanvas"></canvas>
        </div>
        
        <!-- Indicateurs chiffrés -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mt-4">
            <div class="bg-gray-800/50 p-3 rounded-lg">
                <p class="text-xs text-gray-500">RSI</p>
                <p class="text-xl font-mono" :class="selectedAction?.rsi > 70 ? 'trend-up' : selectedAction?.rsi < 30 ? 'trend-down' : ''"
                   x-text="selectedAction?.rsi"></p>
            </div>
            <div class="bg-gray-800/50 p-3 rounded-lg">
                <p class="text-xs text-gray-500">MACD</p>
                <p class="text-xl font-mono" x-text="selectedAction?.macd?.toFixed(2)"></p>
            </div>
            <div class="bg-gray-800/50 p-3 rounded-lg">
                <p class="text-xs text-gray-500">Support</p>
                <p class="text-xl font-mono" x-text="selectedAction?.support?.toFixed(1)"></p>
            </div>
            <div class="bg-gray-800/50 p-3 rounded-lg">
                <p class="text-xs text-gray-500">Résistance</p>
                <p class="text-xl font-mono" x-text="selectedAction?.resistance?.toFixed(1)"></p>
            </div>
        </div>
        
        <!-- Métaux corrélés pour MNG, SMI, CMT -->
        <template x-if="['MNG', 'SMI', 'CMT'].includes(selectedAction?.sym)">
            <div class="mt-4 bg-gray-800/30 p-3 rounded-lg">
                <p class="text-sm text-gray-400 mb-2">🔗 Corrélation métaux</p>
                <div class="text-sm grid grid-cols-2 gap-2">
                    <template x-if="selectedAction.sym === 'MNG'">
                        <>
                            <div><span class="text-gray-500">Or:</span> <span class="font-mono" x-text="metals.precieux?.XAU?.prix?.toFixed(2) + ' USD'"></span></div>
                            <div><span class="text-gray-500">Argent:</span> <span class="font-mono" x-text="metals.precieux?.XAG?.prix?.toFixed(2) + ' USD'"></span></div>
                        </>
                    </template>
                    <template x-if="selectedAction.sym === 'SMI'">
                        <div><span class="text-gray-500">Argent:</span> <span class="font-mono" x-text="metals.precieux?.XAG?.prix?.toFixed(2) + ' USD'"></span></div>
                    </template>
                    <template x-if="selectedAction.sym === 'CMT'">
                        <>
                            <div><span class="text-gray-500">Cuivre:</span> <span class="font-mono" x-text="metals.industriels?.XCU?.prix?.toFixed(2) + ' USD'"></span></div>
                            <div><span class="text-gray-500">Argent:</span> <span class="font-mono" x-text="metals.precieux?.XAG?.prix?.toFixed(2) + ' USD'"></span></div>
                        </>
                    </template>
                </div>
            </div>
        </template>
    </div>
        <!-- MÉTAUX (RÉELS) -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <!-- Métaux précieux -->
        <div class="glass-card p-4">
            <h3 class="text-sm font-semibold text-gray-400 mb-3">
                <i class="fas fa-coins text-yellow-500 mr-2"></i>MÉTAUX PRÉCIEUX
                <span class="ml-2 text-xs text-green-500">✓ RÉELS</span>
            </h3>
            <div class="space-y-2">
                <template x-for="(metal, key) in metals.precieux" :key="key">
                    <div class="flex justify-between items-center p-2 hover:bg-gray-800 rounded-lg">
                        <span class="text-gray-300" x-text="metal.nom"></span>
                        <div class="text-right">
                            <span class="font-mono" x-text="metal.prix.toFixed(2) + ' USD'"></span>
                            <span class="text-sm ml-2" :class="metal.variation >= 0 ? 'trend-up' : 'trend-down'"
                                  x-text="(metal.variation > 0 ? '+' : '') + metal.variation.toFixed(1) + '%'"></span>
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <!-- Métaux industriels -->
        <div class="glass-card p-4">
            <h3 class="text-sm font-semibold text-gray-400 mb-3">
                <i class="fas fa-industry text-blue-500 mr-2"></i>MÉTAUX INDUSTRIELS
            </h3>
            <div class="space-y-2">
                <template x-for="(metal, key) in metals.industriels" :key="key">
                    <div class="flex justify-between items-center p-2 hover:bg-gray-800 rounded-lg">
                        <span class="text-gray-300" x-text="metal.nom"></span>
                        <div class="text-right">
                            <span class="font-mono" x-text="metal.prix.toFixed(2) + ' USD'"></span>
                            <span class="text-sm ml-2" :class="metal.variation >= 0 ? 'trend-up' : 'trend-down'"
                                  x-text="(metal.variation > 0 ? '+' : '') + metal.variation.toFixed(1) + '%'"></span>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </div>
    <!-- FOOTER -->
    <div class="mt-6 text-center text-xs text-gray-600">
        <p>🏅 Or/Argent en temps réel · 📊 Graphiques interactifs · ⚡ Mise à jour auto</p>
    </div>
</div>

<script>
function taoussiMachine() {
    return {
        loading: false,
        moroccoTime: '',
        actions: [],
        metals: { precieux: {}, industriels: {} },
        masi: null,
        volume: null,
        variation: null,
        selectedAction: null,
        selectedIndicator: 'prix',
        chartInstance: null,
        
        init() {
            this.updateTime();
            setInterval(() => this.updateTime(), 1000);
            this.loadData();
            setInterval(() => this.loadData(), 300000); // 5 minutes
        },
        
        updateTime() {
            const now = new Date();
            const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
            const moroccoTime = new Date(utc + (3600000 * 1));
            this.moroccoTime = moroccoTime.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
        },
        
        async loadData() {
            this.loading = true;
            try {
                const res = await fetch('https://benlouka062-pixel.github.io/bourse-casa-bot./data.json?t=' + Date.now());
                const data = await res.json();
                
                if (data.actions) {
                    this.actions = data.actions;
                }
                
                if (data.metaux) {
                    this.metals = data.metaux;
                }
                
                this.masi = data.masi || '---';
                this.volume = data.volume || '---';
                this.variation = data.variation || '---';
                
                if (this.selectedAction) {
                    const updated = this.actions.find(a => a.sym === this.selectedAction.sym);
                    if (updated) {
                        this.selectedAction = updated;
                        this.$nextTick(() => this.updateChart());
                    }
                }
                
            } catch (e) {
                console.error('Erreur chargement', e);
            } finally {
                this.loading = false;
            }
        },
        
        refreshData() {
            this.loadData();
        },
        
        selectAction(action) {
            this.selectedAction = action;
            this.selectedIndicator = 'prix';
            this.$nextTick(() => this.updateChart());
        },
        
        closeDetails() {
            this.selectedAction = null;
            if (this.chartInstance) {
                this.chartInstance.destroy();
                this.chartInstance = null;
            }
        },
        
        setIndicator(indicator) {
            this.selectedIndicator = indicator;
            this.updateChart();
        },
        
        updateChart() {
            if (!this.selectedAction || !this.$refs.chartCanvas) return;
            
            if (this.chartInstance) this.chartInstance.destroy();
            
            const ctx = this.$refs.chartCanvas.getContext('2d');
            const historique = this.selectedAction.historique || [];
            
            // Préparer les labels (30 derniers jours)
            const labels = [];
            for (let i = 0; i < 30; i++) {
                const d = new Date();
                d.setDate(d.getDate() - (29 - i));
                labels.push(d.toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit' }));
            }
            
            let datasets = [];
            
            switch(this.selectedIndicator) {
                case 'prix':
                    datasets = [{
                        label: `${this.selectedAction.sym} - Prix`,
                        data: historique,
                        borderColor: '#10b981',
                        backgroundColor: 'rgba(16, 185, 129, 0.1)',
                        borderWidth: 2,
                        pointRadius: 0,
                        tension: 0.4,
                        fill: true
                    }];
                    break;
                    
                case 'rsi':
                    // Simuler RSI historique
                    const rsiData = historique.map((p, i) => 50 + Math.sin(i) * 20);
                    datasets = [{
                        label: 'RSI',
                        data: rsiData,
                        borderColor: '#f59e0b',
                        borderWidth: 2,
                        pointRadius: 0,
                        tension: 0.4,
                    }];
                    break;
                    
                case 'macd':
                    datasets = [
                        {
                            label: 'MACD',
                            data: historique.map(() => this.selectedAction.macd || 0),
                            borderColor: '#3b82f6',
                            borderWidth: 2,
                        },
                        {
                            label: 'Signal',
                            data: historique.map(() => this.selectedAction.signal_macd || 0),
                            borderColor: '#ef4444',
                            borderWidth: 2,
                        }
                    ];
                    break;
                    
                case 'bollinger':
                    datasets = [
                        {
                            label: 'Bande haute',
                            data: historique.map(() => this.selectedAction.bb_haut || 0),
                            borderColor: '#10b981',
                            borderWidth: 1,
                            borderDash: [5, 5],
                        },
                        {
                            label: 'Prix',
                            data: historique,
                            borderColor: '#ffffff',
                            borderWidth: 2,
                        },
                        {
                            label: 'Bande basse',
                            data: historique.map(() => this.selectedAction.bb_bas || 0),
                            borderColor: '#10b981',
                            borderWidth: 1,
                            borderDash: [5, 5],
                        }
                    ];
                    break;
                    
                case 'volume':
                    datasets = [{
                        label: 'Volume',
                        data: historique.map((v, i) => 100000 + Math.random() * 50000),
                        backgroundColor: '#10b981',
                        borderColor: '#10b981',
                        type: 'bar',
                    }];
                    break;
            }
            
            this.chartInstance = new Chart(ctx, {
                type: this.selectedIndicator === 'volume' ? 'bar' : 'line',
                data: { labels: labels, datasets: datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { labels: { color: '#9ca3af' } },
                        tooltip: { mode: 'index', intersect: false }
                    },
                    scales: {
                        y: { grid: { color: '#333' }, ticks: { color: '#888' } },
                        x: { grid: { display: false }, ticks: { color: '#888', maxRotation: 45, minRotation: 45 } }
                    }
                }
            });
        }
    }
}
</script>

</body>
</html>
