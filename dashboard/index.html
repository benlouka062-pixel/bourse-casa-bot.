<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taoussi Capital - Dashboard Trading Avancé</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0f1e 0%, #0c1222 100%);
            color: #e0e0e0;
            padding: 20px;
            min-height: 100vh;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { margin-bottom: 25px; }
        h1 {
            font-size: 1.8rem;
            background: linear-gradient(90deg, #ffd700, #ff8c00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: inline-block;
        }
        .date { color: #888; margin-top: 8px; font-size: 0.85rem; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: rgba(20, 25, 40, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
        }
        .card-header {
            padding: 15px 20px;
            background: rgba(0,0,0,0.3);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .card-header h3 { font-size: 1.2rem; font-weight: 600; }
        .price { font-size: 1.5rem; font-weight: bold; color: #ffd966; }
        .signal {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
        }
        .signal-achat { background: #2e7d32; color: white; }
        .signal-vente { background: #c62828; color: white; }
        .signal-attente { background: #ff9800; color: #1e1e1e; }
        .signal-fort { background: #1b5e20; color: white; box-shadow: 0 0 8px #2e7d32; }
        .card-body { padding: 15px 20px; }
        .indicator-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .indicator-label { color: #aaa; font-size: 0.85rem; }
        .indicator-value { font-weight: 600; font-size: 0.9rem; }
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.7rem;
            background: rgba(255,255,255,0.1);
            margin: 2px;
        }
        .correlation-positive { color: #4caf50; }
        .correlation-negative { color: #f44336; }
        .metaux-section {
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 20px;
            margin-top: 20px;
        }
        .metaux-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        .metal-card {
            background: rgba(30,35,50,0.8);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
        }
        .metal-price { font-size: 1.2rem; font-weight: bold; color: #ffd966; }
        footer { text-align: center; color: #555; margin-top: 30px; font-size: 0.75rem; }
        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } body { padding: 10px; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>⚡ TAOUSSI CAPITAL</h1>
        <div class="date" id="date-display"></div>
        <div class="subtitle" style="color:#888; font-size:0.85rem;">Bourse de Casablanca · Données réelles · Swing Trading</div>
    </div>
    <div id="actions-container" class="grid"></div>
    <div class="metaux-section">
        <h3>🏅 MÉTAUX (Prix en USD)</h3>
        <div id="metaux-container" class="metaux-grid"></div>
    </div>
    <footer>Données calculées à partir de l'historique réel | Agents IA avec RSI, ADX, MACD, Supertrend, Corrélations</footer>
</div>
<script>
    async function loadData() {
        try {
            const response = await fetch('https://benlouka062-pixel.github.io/bourse-casa-bot/data.json');
            const data = await response.json();
            document.getElementById('date-display').innerHTML = `📅 ${data.date} | ${data.source}`;
            const actions = data.actions || [];
            const actionsContainer = document.getElementById('actions-container');
            const metauxContainer = document.getElementById('metaux-container');
            actionsContainer.innerHTML = '';
            metauxContainer.innerHTML = '';
            const metalsList = [];
            actions.forEach(action => {
                const sym = action.sym;
                const isMetal = ['XAU', 'XAG', 'COPPER', 'ZINC', 'LEAD'].includes(sym);
                if (isMetal) { metalsList.push(action); return; }
                let signalClass = 'signal-attente';
                if (action.signal.includes('ACHAT')) signalClass = action.signal.includes('FORT') ? 'signal-fort' : 'signal-achat';
                if (action.signal.includes('VENTE')) signalClass = 'signal-vente';
                const macd = action.macd || {};
                const supertrend = action.supertrend === 1 ? 'HAUSSIER' : (action.supertrend === -1 ? 'BAISSIER' : 'NEUTRE');
                const supertrendClass = action.supertrend === 1 ? 'style="color:#4caf50"' : (action.supertrend === -1 ? 'style="color:#f44336"' : '');
                let correlationsHtml = '';
                if (action.correlations && action.correlations.length > 0) {
                    correlationsHtml = '<div class="indicator-row"><span class="indicator-label">🔗 Corrélations</span><span>';
                    action.correlations.forEach(c => {
                        const signClass = c.correlation > 0 ? 'correlation-positive' : 'correlation-negative';
                        correlationsHtml += `<span class="badge ${signClass}">${c.metal}: ${c.correlation > 0 ? '+' : ''}${c.correlation}</span>`;
                    });
                    correlationsHtml += '</span></div>';
                }
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-header">
                        <h3>${action.nom} <span style="font-size:0.7rem; color:#888;">(${sym})</span></h3>
                        <div><span class="price">${action.prix.toLocaleString()} DH</span></div>
                    </div>
                    <div class="card-body">
                        <div class="indicator-row"><span class="indicator-label">🎯 Signal</span><span class="signal ${signalClass}">${action.signal}</span></div>
                        <div class="indicator-row"><span class="indicator-label">📊 RSI (14)</span><span class="indicator-value">${action.rsi}</span></div>
                        <div class="indicator-row"><span class="indicator-label">📈 ADX (tendance)</span><span class="indicator-value">${action.adx || 'N/A'}</span></div>
                        <div class="indicator-row"><span class="indicator-label">📉 Supertrend</span><span class="indicator-value" ${supertrendClass}>${supertrend}</span></div>
                        <div class="indicator-row"><span class="indicator-label">📊 MACD</span><span class="indicator-value">${macd.macd || 'N/A'} | Signal: ${macd.signal || 'N/A'}</span></div>
                        <div class="indicator-row"><span class="indicator-label">🛡️ Support</span><span class="indicator-value">${action.support}</span></div>
                        <div class="indicator-row"><span class="indicator-label">🚀 Résistance</span><span class="indicator-value">${action.resistance}</span></div>
                        ${action.breakout ? '<div class="indicator-row"><span class="indicator-label">💥 Breakout</span><span class="indicator-value" style="color:#4caf50;">OUI</span></div>' : ''}
                        ${action.divergence ? `<div class="indicator-row"><span class="indicator-label">🔄 Divergence</span><span class="indicator-value">${action.divergence}</span></div>` : ''}
                        ${correlationsHtml}
                    </div>
                `;
                actionsContainer.appendChild(card);
            });
            metalsList.forEach(metal => {
                const metalCard = document.createElement('div');
                metalCard.className = 'metal-card';
                metalCard.innerHTML = `<div><strong>${metal.nom}</strong></div><div class="metal-price">$${metal.prix.toLocaleString()}</div><div style="font-size:0.7rem; color:#888;">${metal.breakout ? '💥 Breakout' : ''}</div>`;
                metauxContainer.appendChild(metalCard);
            });
        } catch (error) {
            console.error('Erreur chargement data.json:', error);
            document.getElementById('actions-container').innerHTML = '<div style="text-align:center; padding:40px;">❌ Erreur de chargement des données. Vérifiez le fichier data.json sur GitHub.</div>';
        }
    }
    loadData();
    setInterval(loadData, 60000);
</script>
</body>
</html>
